<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#6c3ce6">
    <title>Star Points HQ</title>
    <!-- GitHub Pages project sites live under /repo-name/; <base> fixes relative CSS/JS paths. -->
    <script>
        (function () {
            if (location.protocol === 'file:') return;
            var path = location.pathname.replace(/\/?index\.html?$/i, '');
            if (path !== '/' && !path.endsWith('/')) path += '/';
            if (path === '') path = '/';
            var b = document.createElement('base');
            b.href = location.origin + path;
            document.head.insertBefore(b, document.head.firstChild);
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="bg-blobs" aria-hidden="true"></div>
    <main class="container">
        <header class="hero">
            <p class="hero-badge" aria-hidden="true">Level up</p>
            <h1>Star Points HQ</h1>
            <p class="tagline">Rack up points. Hit 100. Victory dance optional (but encouraged).</p>
            <p class="sync-status" id="sync-status" role="status" aria-live="polite"></p>
        </header>

        <div class="kid-tracker">
            <article class="kid-card kid-card--kts" id="kts-card">
                <div class="kid-card__header">
                    <h2>KTS</h2>
                    <span class="kid-card__emoji" aria-hidden="true">🚀</span>
                </div>
                <p class="points" id="kts-points" aria-live="polite">0</p>
                <div class="progress" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="kts-progressbar">
                    <div class="progress__fill" id="kts-progress-fill"></div>
                </div>
                <p class="progress-label" id="kts-progress-label">0 / 100 to prize</p>
                <div class="buttons">
                    <button type="button" class="add-btn" data-kid="kts" data-points="1">+1</button>
                    <button type="button" class="add-btn" data-kid="kts" data-points="5">+5</button>
                    <button type="button" class="add-btn" data-kid="kts" data-points="10">+10</button>
                    <button type="button" class="subtract-btn" data-kid="kts" data-points="-1">−1</button>
                </div>
                <div class="prize-message" id="kts-prize" aria-live="polite"></div>
            </article>

            <article class="kid-card kid-card--kes" id="kes-card">
                <div class="kid-card__header">
                    <h2>KES</h2>
                    <span class="kid-card__emoji" aria-hidden="true">⭐</span>
                </div>
                <p class="points" id="kes-points" aria-live="polite">0</p>
                <div class="progress" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="kes-progressbar">
                    <div class="progress__fill" id="kes-progress-fill"></div>
                </div>
                <p class="progress-label" id="kes-progress-label">0 / 100 to prize</p>
                <div class="buttons">
                    <button type="button" class="add-btn" data-kid="kes" data-points="1">+1</button>
                    <button type="button" class="add-btn" data-kid="kes" data-points="5">+5</button>
                    <button type="button" class="add-btn" data-kid="kes" data-points="10">+10</button>
                    <button type="button" class="subtract-btn" data-kid="kes" data-points="-1">−1</button>
                </div>
                <div class="prize-message" id="kes-prize" aria-live="polite"></div>
            </article>
        </div>

        <footer class="footer-actions">
            <button type="button" id="reset-all" class="reset-btn">Reset all points</button>
        </footer>
    </main>
    <script>
        window.SUPABASE_URL = window.SUPABASE_URL || '';
        window.SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY || '';
    </script>
    <script src="./config.js"></script>
    <script type="module" src="./script.js"></script>
</body>
</html>
